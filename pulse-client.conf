# PulseAudio client configuration for Docker

# Do not automatically start a local PulseAudio daemon
autospawn = no

# Disable shared memory (recommended for containers)
enable-shm = no

# Default socket location
default-server = unix:/run/pulse/native

# Disable authentication cookie
cookie-file = /dev/null

# Never exit because of inactivity
exit-idle-time = -1

# Don't attempt to launch a daemon
daemon-binary = /bin/true
