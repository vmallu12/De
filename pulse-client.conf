# Disable automatic PulseAudio daemon
autospawn = no

# Do not use shared memory (better for containers)
enable-shm = no

# Default server socket
default-server = unix:/run/pulse/native

# Disable cookie authentication
cookie-file = /dev/null

# Don't exit automatically
exit-idle-time = -1

# Disable shared memory pool
shm-size-bytes = 0

# Don't spawn a local daemon
daemon-binary = /bin/true
